name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

# Cancel in-flight runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Strategy: conda-forge on every platform.
#
#   1. Same versions everywhere. Apt's libjxl is 0.7.0 on Ubuntu LTS;
#      brew has 0.11.2; conda-forge has 0.11.2. With one channel, every
#      runner exercises identical code paths.
#   2. libjxl 0.11+ guaranteed. Stable distros all ship < 0.11; only
#      conda-forge and rolling distros have 0.11+. We cannot rely on
#      stable distros — and conda-forge works on every Linux base.
#   3. Already validated. The win-vm setup uses exactly this conda env.

# Bump CACHE_VERSION to force a fresh conda env even when the
# environment.yml hash hasn't changed (e.g. to pick up a new conda-forge
# build of an existing version).
env:
  CACHE_VERSION: 1

jobs:
  test:
    name: ${{ matrix.os }} Py ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      # ----- Cache conda packages -----
      # Caches the package tarballs conda downloaded after the first solve.
      # Subsequent runs skip the network round-trip — install is just an
      # extract from the cache. Keyed on environment.yml + Python version
      # + OS so a change to any of those triggers a fresh download.
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: |
            ~/conda_pkgs_dir
            ~/.conda/pkgs
          key: conda-pkgs-v${{ env.CACHE_VERSION }}-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('ci/environment.yml') }}
          restore-keys: |
            conda-pkgs-v${{ env.CACHE_VERSION }}-${{ runner.os }}-py${{ matrix.python-version }}-
            conda-pkgs-v${{ env.CACHE_VERSION }}-${{ runner.os }}-

      - name: Set up Miniforge + codec libs
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: ${{ matrix.python-version }}
          activate-environment: ocbuild
          environment-file: ci/environment.yml
          channels: conda-forge
          # Use mamba where available (it's pre-staged in setup-miniconda v3)
          # for ~3x faster solves; falls back to conda when mamba's missing.
          use-mamba: true

      # ----- Pip cache (pip install -e .[test] downloads several wheels) -----
      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: pip-v${{ env.CACHE_VERSION }}-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-v${{ env.CACHE_VERSION }}-${{ runner.os }}-py${{ matrix.python-version }}-

      # ----- Build + test -----
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[test]

      - name: List registered codecs (libjxl MUST be present)
        run: |
          python -c "
          import opencodecs as oc
          names = sorted(c['name'] for c in oc.list_codecs())
          print(f'{len(names)} codecs:', names)
          assert 'jxl' in names, 'libjxl extension MUST register on every platform'
          "

      - name: Run tests
        run: pytest -q --cov=src/opencodecs --cov-report=xml --junitxml=junit.xml

      - name: Upload coverage + junit (one matrix cell)
        if: matrix.os == 'macos-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage.xml
            junit.xml
          if-no-files-found: warn
