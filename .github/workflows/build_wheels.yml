name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish target"
        type: choice
        required: true
        default: "none"
        options: ["none", "testpypi", "pypi"]
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# IMPORTANT: opencodecs links against ~12 system C libraries. cibuildwheel
# runs Linux builds inside a manylinux container that doesn't have most of
# those preinstalled — they get pulled in via the CIBW_BEFORE_ALL_LINUX
# script (see [tool.cibuildwheel.linux] in pyproject.toml), which dnf-installs
# what's available and builds libjxl from source via bench/build_libjxl.sh.
# macOS / Windows builds run on the host, so we install via brew / conda
# before invoking cibuildwheel. ``auditwheel`` (Linux) and ``delocate``
# (macOS) bundle each linked .so/.dylib into the resulting wheel.
env:
  LIBJXL_VERSION: v0.11.2

jobs:
  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.archs_linux }}${{ matrix.archs_windows }}${{ matrix.archs_macos }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs_linux: "x86_64"
          - os: ubuntu-24.04-arm
            archs_linux: "aarch64"
          - os: windows-latest
            archs_windows: "AMD64"
          - os: macos-latest
            archs_macos: "arm64"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # macOS: install codec libs via brew (cibuildwheel for macOS runs
      # natively on the host, no container).
      - name: System libs (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update --quiet
          brew install --quiet \
            jpeg-xl libavif libheif webp libpng jpeg-turbo openjpeg \
            zstd brotli c-blosc2 lz4 libdeflate

      # Windows: cibuildwheel can't drive setup-miniconda internally, so
      # we set up conda + the codec env here and pipe CONDA_PREFIX into
      # cibuildwheel via CIBW_ENVIRONMENT_WINDOWS below.
      - name: Miniconda + codec libs (Windows)
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: ocbuild
          channels: conda-forge

      - name: Install codec libs into conda env (Windows)
        if: runner.os == 'Windows'
        shell: bash -el {0}
        run: |
          conda install -y \
            libjxl libavif libheif libwebp libpng libjpeg-turbo openjpeg \
            zlib libdeflate brotli libbrotlicommon c-blosc2 lz4-c zstd
          # Stash the env path so the next step can hand it to cibuildwheel.
          # CONDA_PREFIX is set automatically by `bash -el` activation.
          echo "OCBUILD_CONDA_PREFIX=${CONDA_PREFIX}" >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        with:
          output-dir: ./wheelhouse
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.archs_linux }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.archs_windows }}
          CIBW_ARCHS_MACOS: ${{ matrix.archs_macos }}
          # Linux libjxl version (used by the BEFORE_ALL script in pyproject).
          CIBW_ENVIRONMENT_LINUX: >
            LIBJXL_VERSION=${{ env.LIBJXL_VERSION }}
            OPENCODECS_LIBJXL_PREFIX=/usr/local
          # Windows: hand the conda env path to setup.py via CONDA_PREFIX,
          # and prepend Library\bin to PATH so the codec DLLs resolve at
          # build/test time (numpy delay-loads OpenBLAS from there too).
          CIBW_ENVIRONMENT_WINDOWS: >
            CONDA_PREFIX=${{ env.OCBUILD_CONDA_PREFIX }}
            PATH=${{ env.OCBUILD_CONDA_PREFIX }}\\Library\\bin;$PATH

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs_linux }}${{ matrix.archs_windows }}${{ matrix.archs_macos }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
          if-no-files-found: error

  publish_testpypi:
    name: Publish → TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/opencodecs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish_pypi:
    name: Publish → PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/opencodecs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
