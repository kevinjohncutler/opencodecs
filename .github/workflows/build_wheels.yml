name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish target"
        type: choice
        required: true
        default: "none"
        options: ["none", "testpypi", "pypi"]
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# IMPORTANT: opencodecs links against ~12 system C libraries. cibuildwheel
# runs Linux builds inside a manylinux container that doesn't have most of
# those preinstalled — they get pulled in via the CIBW_BEFORE_ALL_LINUX
# script (see [tool.cibuildwheel.linux] in pyproject.toml), which dnf-installs
# what's available and builds libjxl from source via bench/build_libjxl.sh.
# macOS / Windows builds run on the host; we install via brew / conda
# before invoking cibuildwheel. ``auditwheel`` (Linux) and ``delocate``
# (macOS) bundle each linked .so/.dylib into the resulting wheel.
env:
  LIBJXL_VERSION: v0.11.2
  CACHE_VERSION: 1

jobs:
  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.archs_linux }}${{ matrix.archs_windows }}${{ matrix.archs_macos }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs_linux: "x86_64"
          - os: ubuntu-24.04-arm
            archs_linux: "aarch64"
          - os: windows-latest
            archs_windows: "AMD64"
          - os: macos-latest
            archs_macos: "arm64"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- Caching ----------
      # 1. Linux: cache /usr/local for the cibuildwheel BEFORE_ALL libjxl
      #    build. ~5 min cold → ~30s warm. Key includes libjxl version +
      #    build script hash so a bump invalidates.
      - name: Cache libjxl install (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cibw-cache/usr-local
          key: cibw-libjxl-v${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ matrix.archs_linux }}-${{ env.LIBJXL_VERSION }}-${{ hashFiles('bench/build_libjxl.sh') }}

      # 2. cibuildwheel's own pip cache (per-OS so manylinux container
      #    doesn't share with macOS/Windows). Speeds up the metadata
      #    resolution pass on each build.
      - name: Cache cibuildwheel pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: cibw-pip-v${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: cibw-pip-v${{ env.CACHE_VERSION }}-${{ runner.os }}-

      # 3. macOS: cache Homebrew downloads — the brew install before-all
      #    fetches ~700 MB cumulative, mostly already-installed packages
      #    that brew nonetheless touches. The download cache shaves ~30s.
      - name: Cache Homebrew downloads (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-cibw-v${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: brew-cibw-v${{ env.CACHE_VERSION }}-${{ runner.os }}-

      # 4. Windows: cache the conda package tarballs.
      - name: Cache conda packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/conda_pkgs_dir
            ~\AppData\Local\Temp\conda_pkgs_dir
          key: cibw-conda-pkgs-v${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('ci/environment.yml') }}
          restore-keys: cibw-conda-pkgs-v${{ env.CACHE_VERSION }}-${{ runner.os }}-

      # ---------- Per-OS pre-install (for macOS / Windows; Linux pre-installs
      # happen inside the manylinux container via CIBW_BEFORE_ALL) ----------

      - name: System libs (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update --quiet
          brew install --quiet \
            jpeg-xl libavif libheif webp libpng jpeg-turbo openjpeg \
            zstd brotli c-blosc2 lz4 libdeflate

      - name: Miniconda + codec libs (Windows)
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: ocbuild
          environment-file: ci/environment.yml
          channels: conda-forge
          use-mamba: true

      - name: Stash CONDA_PREFIX + add Library/bin to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash -el {0}
        run: |
          # The codec DLLs (libjxl, libavif, ...) live in
          # $CONDA_PREFIX/Library/bin. cibuildwheel inherits the runner
          # PATH, so prepending here is enough — no CIBW_ENVIRONMENT
          # gymnastics. CONDA_PREFIX itself goes through cibuildwheel
          # since setup.py reads it during the build.
          echo "OCBUILD_CONDA_PREFIX=${CONDA_PREFIX}" >> "$GITHUB_ENV"
          echo "${CONDA_PREFIX}\\Library\\bin" >> "$GITHUB_PATH"

      # ---------- cibuildwheel ----------
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        with:
          output-dir: ./wheelhouse
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.archs_linux }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.archs_windows }}
          CIBW_ARCHS_MACOS: ${{ matrix.archs_macos }}
          # Linux cibuildwheel runs inside manylinux_2_28; mount the
          # cached prefix so libjxl built by BEFORE_ALL persists across
          # runs. OPENCODECS_LIBJXL_PREFIX (write side) and
          # OPENCODECS_JXL_PREFIX (read side via setup.py) both point at
          # the mounted cache. auditwheel bundles libjxl into the wheel
          # regardless of its install location.
          CIBW_CONTAINER_ENGINE: 'docker; create_args: -v ${{ github.workspace }}/.cibw-cache/usr-local:/cibw-jxl-prefix'
          CIBW_ENVIRONMENT_LINUX: >
            LIBJXL_VERSION=${{ env.LIBJXL_VERSION }}
            OPENCODECS_LIBJXL_PREFIX=/cibw-jxl-prefix
            OPENCODECS_JXL_PREFIX=/cibw-jxl-prefix
          # PATH is set via $GITHUB_PATH in the prior step. Pipe both
          # CONDA_PREFIX (for runtime DLL search) and the explicit
          # OPENCODECS_CODEC_LIBS_PREFIX (which setup.py probes
          # unconditionally — pip's isolated build env scrubs CONDA_PREFIX
          # in some configs, so this is the belt-and-braces fallback).
          CIBW_ENVIRONMENT_WINDOWS: >-
            CONDA_PREFIX=${{ env.OCBUILD_CONDA_PREFIX }}
            OPENCODECS_CODEC_LIBS_PREFIX=${{ env.OCBUILD_CONDA_PREFIX }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs_linux }}${{ matrix.archs_windows }}${{ matrix.archs_macos }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
          if-no-files-found: error

  publish_testpypi:
    name: Publish → TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/opencodecs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish_pypi:
    name: Publish → PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/opencodecs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
