name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish target"
        type: choice
        required: true
        default: "none"
        options: ["none", "testpypi", "pypi"]
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# IMPORTANT: opencodecs links against ~12 system C libraries (libjxl,
# libavif, libheif, libwebp, libjpeg-turbo, openjpeg, libdeflate, brotli,
# c-blosc2, lz4, zstd, plus zlib for the vendored libspng). cibuildwheel
# runs Linux builds inside a manylinux container that doesn't have most
# of those preinstalled — they get pulled in via CIBW_BEFORE_ALL_LINUX
# (see [tool.cibuildwheel] in pyproject.toml). macOS / Windows builds
# run on the host, so we install via brew / conda before invoking
# cibuildwheel. ``auditwheel`` (Linux) and ``delocate`` (macOS) then
# bundle each linked .so/.dylib into the wheel itself, producing a
# self-contained binary that doesn't require the user to apt-install
# anything.

jobs:
  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.archs_linux }}${{ matrix.archs_windows }}${{ matrix.archs_macos }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs_linux: "x86_64"
          - os: ubuntu-24.04-arm
            archs_linux: "aarch64"
          - os: windows-latest
            archs_windows: "AMD64"
          - os: macos-latest
            archs_macos: "arm64"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # macOS: install codec libs via brew BEFORE cibuildwheel runs (cibw
      # builds wheels on the host for macOS, no container).
      - name: System libs (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update --quiet
          brew install --quiet \
            jpeg-xl libavif libheif webp libpng jpeg-turbo openjpeg \
            zstd brotli c-blosc2 lz4 libdeflate

      # Windows: cibuildwheel can't drive conda-incubator/setup-miniconda
      # internally, so we set up conda and pre-install the libs into a
      # named env, then point setup.py at that env via CONDA_PREFIX.
      - name: Miniconda + codec libs (Windows)
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: ocbuild
          channels: conda-forge

      - name: Install codec libs into conda env (Windows)
        if: runner.os == 'Windows'
        shell: bash -el {0}
        run: |
          conda install -y \
            libjxl libavif libheif libwebp libpng libjpeg-turbo openjpeg \
            zlib libdeflate brotli libbrotlicommon c-blosc2 lz4-c zstd

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        with:
          output-dir: ./wheelhouse
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.archs_linux }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.archs_windows }}
          CIBW_ARCHS_MACOS: ${{ matrix.archs_macos }}
          # Hand-off to setup.py: on Windows, point at the conda env we
          # just populated. On macOS, brew installs to /opt/homebrew (M*)
          # or /usr/local (Intel) — setup.py probes both.
          CIBW_ENVIRONMENT_WINDOWS: >
            CONDA_PREFIX=C:\\Miniconda3\\envs\\ocbuild

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs_linux }}${{ matrix.archs_windows }}${{ matrix.archs_macos }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
          if-no-files-found: error

  publish_testpypi:
    name: Publish → TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/opencodecs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish_pypi:
    name: Publish → PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/opencodecs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
